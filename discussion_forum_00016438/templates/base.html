<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Django Forum</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .navbar-brand {
        font-weight: bold;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="{% url 'post_list' %}"
          >DISCUSSION FORUM</a
        >

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <div class="navbar-nav ms-auto align-items-center">
            {% if user.is_authenticated %} {% if user.is_staff %}
            <a class="nav-link text-warning me-3" href="/admin/"
              >⚙️ Admin Panel</a
            >
            {% endif %} ... {% endif %} {% if user.is_authenticated %}
            <a class="nav-link me-3" href="{% url 'post_create' %}"
              >+ New Post</a
            >

            <span class="navbar-text text-white me-3">
              Hello, <strong>{{ user.username }}</strong>
            </span>

            <form action="{% url 'logout' %}" method="post" class="d-inline">
              {% csrf_token %}
              <button type="submit" class="btn btn-outline-light btn-sm">
                Logout
              </button>
            </form>
            {% else %}
            <a class="nav-link" href="{% url 'login' %}">Login</a>
            <a class="btn btn-primary btn-sm ms-2" href="{% url 'signup' %}"
              >Sign Up</a
            >
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    <div class="container">{% block content %} {% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

upstream django {   
    server web:8000;
}

server {
    listen 80;
    server_name dscc-cw-00016438.uaenorth.cloudapp.azure.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dscc-cw-00016438.uaenorth.cloudapp.azure.com;

    ssl_certificate /etc/letsencrypt/live/dscc-cw-00016438.uaenorth.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dscc-cw-00016438.uaenorth.cloudapp.azure.com/privkey.pem;

    location / {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /static/ {
        alias /usr/share/nginx/html/static/;
    }
}
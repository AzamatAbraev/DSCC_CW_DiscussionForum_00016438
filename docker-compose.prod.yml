services:
  web:
    image: ${DOCKER_USERNAME}/dscc-cw-app:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always
    command: gunicorn --pythonpath discussion_forum_00016438 config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - static_volume:/app/discussion_forum_00016438/staticfiles

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/share/nginx/html/static
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  static_volume:
  